<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beshyy Moments</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --border: #2a2a32;
      --accent: #c8a96e;
      --text: #f0ede8;
      --muted: #7a7a8a;
      --card-bg: #141418;
      --green: #4caf82;
      --red: #e05555;
    }

    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* ── Name gate ── */
    #name-gate {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
      transition: opacity 0.3s;
    }
    #name-gate.hidden { opacity: 0; pointer-events: none; }
    .gate-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px; max-width: 400px; width: 100%;
      text-align: center;
    }
    .gate-box .gate-icon { font-size: 2.4rem; margin-bottom: 16px; }
    .gate-box h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 400; margin-bottom: 8px; }
    .gate-box p { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.5; }
    .gate-box input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 1rem; padding: 12px 16px; outline: none; text-align: center;
      transition: border-color 0.15s; margin-bottom: 14px;
    }
    .gate-box input:focus { border-color: var(--accent); }
    .gate-box button {
      width: 100%; background: var(--accent); color: #0e0e10; border: none;
      border-radius: 8px; padding: 12px; font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    }
    .gate-box button:hover { opacity: 0.85; }

    /* ── Header ── */
    header {
      text-align: center; padding: 64px 24px 40px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .eyebrow { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
    header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.6rem); font-weight: 400; }
    header h1 em { font-style: italic; color: var(--accent); }
    header p { margin-top: 12px; color: var(--muted); font-size: 0.9rem; }

    .user-badge {
      position: absolute; top: 20px; right: 20px;
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px 6px 10px;
      font-size: 0.8rem; color: var(--muted);
    }
    .user-badge .avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent); color: #0e0e10;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
    }
    .user-badge span { color: var(--text); }
    .user-badge button {
      background: none; border: none; color: var(--muted);
      font-size: 0.75rem; cursor: pointer; padding: 0; margin-left: 4px;
    }
    .user-badge button:hover { color: var(--text); }

    /* ── Live indicator ── */
    .live-bar {
      max-width: 1100px; margin: 0 auto;
      padding: 16px 24px 0;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--muted);
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Toolbar ── */
    .toolbar {
      max-width: 1100px; margin: 0 auto;
      padding: 20px 24px 0;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .btn-add {
      display: flex; align-items: center; gap: 8px;
      background: var(--accent); color: #0e0e10; border: none;
      border-radius: 6px; padding: 10px 20px;
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.85; }

    .view-toggle {
      margin-left: auto; display: flex; gap: 4px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px;
    }
    .view-btn {
      background: none; border: none; color: var(--muted);
      padding: 6px 10px; border-radius: 4px; cursor: pointer;
      font-size: 0.8rem; transition: all 0.15s;
    }
    .view-btn.active { background: var(--border); color: var(--text); }

    /* ── Grid ── */
    .grid {
      max-width: 1100px; margin: 28px auto 80px;
      padding: 0 24px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .grid.list-view { grid-template-columns: 1fr; max-width: 700px; }

    /* ── Card ── */
    .card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .card:hover { border-color: var(--accent); transform: translateY(-3px); }

    .card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; cursor: pointer; }
    .card-img-placeholder {
      width: 100%; aspect-ratio: 4/3; display: flex;
      align-items: center; justify-content: center;
      background: var(--surface); color: var(--muted); font-size: 2rem; cursor: pointer;
    }
    .list-view .card-img, .list-view .card-img-placeholder { aspect-ratio: 16/7; }

    .card-body { padding: 14px 16px 16px; }

    .card-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .card-date { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }

    .card-author {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--muted);
    }
    .card-author .av {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: #0e0e10; flex-shrink: 0;
    }

    .card-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 400; line-height: 1.3; margin-bottom: 6px; }
    .card-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.55; }

    .card-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn-sm {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 11px; border-radius: 4px;
      font-family: 'DM Sans', sans-serif; font-size: 0.76rem; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
    .btn-sm:disabled { opacity: 0.35; pointer-events: none; }

    .card-tag {
      position: absolute; top: 10px; right: 10px;
      background: rgba(14,14,16,0.78); backdrop-filter: blur(6px);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 3px 10px; font-size: 11px; color: var(--muted);
    }

    /* ── Empty ── */
    .empty { grid-column: 1/-1; text-align: center; padding: 80px 24px; color: var(--muted); }
    .empty .icon { font-size: 2.8rem; margin-bottom: 14px; }
    .empty h2 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 1.4rem; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 0.88rem; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 20px;
      font-size: 0.85rem; color: var(--text);
      opacity: 0; transition: all 0.25s; z-index: 300; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 480px; padding: 30px;
      transform: translateY(16px); transition: transform 0.2s; max-height: 90vh; overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 22px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.04em; }
    .field input, .field textarea, .field select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; padding: 10px 14px; outline: none; transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 76px; }

    .upload-zone {
      border: 2px dashed var(--border); border-radius: 6px;
      padding: 20px; text-align: center; cursor: pointer;
      color: var(--muted); font-size: 0.83rem; transition: border-color 0.15s;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-zone .up-icon { font-size: 1.4rem; margin-bottom: 4px; }

    .img-preview { margin-top: 10px; width: 100%; max-height: 160px; object-fit: cover; border-radius: 6px; display: none; }

    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
    .btn-cancel {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 9px 18px;
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem; cursor: pointer;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-save {
      background: var(--accent); color: #0e0e10; border: none; border-radius: 6px;
      padding: 9px 22px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
      font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }

    /* ── View modal ── */
    .view-modal .modal { max-width: 580px; padding: 0; overflow: hidden; }
    .vm-img { width: 100%; max-height: 320px; object-fit: cover; }
    .vm-body { padding: 24px 28px 28px; }
    .vm-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .vm-date { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    .vm-author-row { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--muted); }
    .vm-author-row .av { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #0e0e10; }
    .vm-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 10px; }
    .vm-desc { color: var(--muted); line-height: 1.65; font-size: 0.88rem; }

    @media (max-width: 540px) {
      .grid { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
      .user-badge { top: 14px; right: 14px; }
    }
  </style>
</head>
<body>

<!-- Name gate -->
<div id="name-gate">
  <div class="gate-box">
    <div class="gate-icon">👋</div>
    <h2>What's your name?</h2>
    <p>Your name will appear on every moment you share with the group.</p>
    <input type="text" id="name-input" placeholder="e.g. Maria" maxlength="30" onkeydown="if(event.key==='Enter')enterApp()"/>
    <button onclick="enterApp()">Enter</button>
  </div>
</div>

<!-- Header -->
<header>
  <div class="user-badge" id="user-badge" style="display:none">
    <div class="avatar" id="hdr-avatar"></div>
    <span id="hdr-name"></span>
    <button onclick="changeName()" title="Change name">✏️</button>
  </div>
  <p class="eyebrow">Shared Collection</p>
  <h1>Our <em>Moments</em></h1>
  <p>A quiet place to keep the pictures and stories that matter most.</p>
</header>

<div class="live-bar">
  <div class="live-dot"></div>
  <span id="live-count">Loading moments…</span>
</div>

<div class="toolbar">
  <button class="btn-add" onclick="openAddModal()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
    </svg>
    Add Moment
  </button>
  <div class="view-toggle">
    <button class="view-btn active" id="grid-btn" onclick="setView('grid')">⊞ Grid</button>
    <button class="view-btn" id="list-btn" onclick="setView('list')">☰ List</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<!-- Add Modal -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <h2>New Moment</h2>
    <div class="field">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="Give this moment a name…"/>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="f-date"/>
    </div>
    <div class="field">
      <label>Photo</label>
      <div class="upload-zone">
        <input type="file" accept="image/*" id="f-file" onchange="handleFile(this)"/>
        <div class="up-icon">📷</div>
        <div>Tap or click to choose a photo</div>
      </div>
      <img class="img-preview" id="img-preview"/>
    </div>
    <div class="field">
      <label>Caption / Story</label>
      <textarea id="f-desc" placeholder="What made this moment special?"></textarea>
    </div>
    <div class="field">
      <label>Tag</label>
      <select id="f-tag">
        <option value="">— none —</option>
        <option value="Travel">Travel</option>
        <option value="Family">Family</option>
        <option value="Friends">Friends</option>
        <option value="Food">Food</option>
        <option value="Nature">Nature</option>
        <option value="Milestone">Milestone</option>
        <option value="Everyday">Everyday</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('form-modal')">Cancel</button>
      <button class="btn-save" onclick="saveCard()">Share Moment</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-overlay view-modal" id="view-modal">
  <div class="modal">
    <img class="vm-img" id="vm-img" src="" alt="" style="display:none"/>
    <div class="vm-body">
      <div class="vm-top">
        <div class="vm-date" id="vm-date"></div>
        <div class="vm-author-row">
          <div class="av" id="vm-av"></div>
          <span id="vm-author"></span>
        </div>
      </div>
      <div class="vm-title" id="vm-title"></div>
      <div class="vm-desc" id="vm-desc"></div>
      <div class="modal-footer" style="margin-top:18px">
        <button class="btn-cancel" onclick="closeModal('view-modal')">Close</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Palette for author avatars ──
  const COLORS = ['#c8a96e','#4caf82','#6e9ec8','#c86e9a','#9ec86e','#c8936e','#6ec8c2'];
  function strColor(str) {
    let h = 0; for (let c of str) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
  }
  function initials(name) { return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }

  // ── User identity ──
  let currentUser = localStorage.getItem('moments_user') || '';

  function enterApp() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) { document.getElementById('name-input').focus(); return; }
    currentUser = name;
    localStorage.setItem('moments_user', name);
    document.getElementById('name-gate').classList.add('hidden');
    showUserBadge();
    renderGrid();
    startPolling();
  }

  function showUserBadge() {
    const badge = document.getElementById('user-badge');
    badge.style.display = 'flex';
    document.getElementById('hdr-name').textContent = currentUser;
    const av = document.getElementById('hdr-avatar');
    av.textContent = initials(currentUser);
    av.style.background = strColor(currentUser);
  }

  function changeName() {
    currentUser = '';
    localStorage.removeItem('moments_user');
    document.getElementById('user-badge').style.display = 'none';
    document.getElementById('name-input').value = '';
    document.getElementById('name-gate').classList.remove('hidden');
  }

  // ── Storage (shared via window.storage) ──
  const STORE_KEY = 'shared-moments-v1';
  let moments = [];
  let lastCount = -1;

  async function loadMoments() {
    try {
      const res = await window.storage.get(STORE_KEY, true);
      moments = res ? JSON.parse(res.value) : [];
    } catch(e) { moments = []; }
  }

  async function saveMoments() {
    try {
      await window.storage.set(STORE_KEY, JSON.stringify(moments), true);
    } catch(e) { showToast('Could not save — storage error'); }
  }

  // ── Polling for live updates ──
  let pollTimer;
  async function poll() {
    await loadMoments();
    if (moments.length !== lastCount) {
      lastCount = moments.length;
      renderGrid();
    }
    updateLiveCount();
  }
  function startPolling() { poll(); pollTimer = setInterval(poll, 5000); }

  function updateLiveCount() {
    const el = document.getElementById('live-count');
    el.textContent = moments.length === 0
      ? 'No moments yet — be the first!'
      : `${moments.length} moment${moments.length===1?'':'s'} shared`;
  }

  // ── Render ──
  function renderGrid() {
    const grid = document.getElementById('grid');
    updateLiveCount();
    if (moments.length === 0) {
      grid.innerHTML = `<div class="empty"><div class="icon">🌿</div><h2>No moments yet</h2><p>Add the first one for everyone to see.</p></div>`;
      return;
    }
    grid.innerHTML = '';
    [...moments].reverse().forEach((m, ri) => {
      const i = moments.length - 1 - ri;
      const card = document.createElement('div');
      card.className = 'card';
      const col = strColor(m.author || '?');
      const imgHtml = m.img
        ? `<img class="card-img" src="${m.img}" alt="${m.title}" onclick="viewCard(${i})"/>`
        : `<div class="card-img-placeholder" onclick="viewCard(${i})">🖼️</div>`;
      const tagHtml = m.tag ? `<div class="card-tag">${m.tag}</div>` : '';
      const dateStr = m.date ? new Date(m.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
      const isOwn = m.author === currentUser;
      card.innerHTML = `
        ${imgHtml}${tagHtml}
        <div class="card-body">
          <div class="card-meta">
            ${dateStr ? `<div class="card-date">${dateStr}</div>` : '<div></div>'}
            <div class="card-author">
              <div class="av" style="background:${col}">${initials(m.author||'?')}</div>
              ${m.author||'Unknown'}
            </div>
          </div>
          <div class="card-title">${m.title||'Untitled'}</div>
          ${m.desc?`<div class="card-desc">${m.desc.slice(0,100)}${m.desc.length>100?'…':''}</div>`:''}
          <div class="card-actions">
            <button class="btn-sm" onclick="viewCard(${i})">View</button>
            ${isOwn?`<button class="btn-sm danger" onclick="deleteCard(${i})">Delete</button>`:''}
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  // ── Add ──
  function openAddModal() {
    if (!currentUser) return;
    document.getElementById('f-title').value = '';
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-desc').value = '';
    document.getElementById('f-tag').value = '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-preview').src = '';
    document.getElementById('f-file').value = '';
    window._pendingImg = null;
    openModal('form-modal');
  }

  async function saveCard() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { alert('Please add a title.'); return; }
    const m = {
      title, author: currentUser,
      date: document.getElementById('f-date').value,
      desc: document.getElementById('f-desc').value.trim(),
      tag: document.getElementById('f-tag').value,
      img: window._pendingImg || null,
      ts: Date.now()
    };
    await loadMoments();
    moments.push(m);
    await saveMoments();
    lastCount = moments.length;
    renderGrid();
    closeModal('form-modal');
    showToast('✨ Moment shared!');
  }

  async function deleteCard(i) {
    if (!confirm('Remove your moment?')) return;
    await loadMoments();
    moments.splice(i, 1);
    await saveMoments();
    lastCount = moments.length;
    renderGrid();
    showToast('Moment removed.');
  }

  function viewCard(i) {
    const m = moments[i];
    const vmImg = document.getElementById('vm-img');
    if (m.img) { vmImg.src = m.img; vmImg.style.display = 'block'; }
    else { vmImg.style.display = 'none'; }
    const col = strColor(m.author||'?');
    const dateStr = m.date ? new Date(m.date+'T12:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : '';
    document.getElementById('vm-date').textContent = dateStr + (m.tag?(dateStr?' · ':'')+m.tag:'');
    document.getElementById('vm-av').textContent = initials(m.author||'?');
    document.getElementById('vm-av').style.background = col;
    document.getElementById('vm-author').textContent = m.author||'Unknown';
    document.getElementById('vm-title').textContent = m.title||'Untitled';
    document.getElementById('vm-desc').textContent = m.desc||'';
    openModal('view-modal');
  }

  function handleFile(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      window._pendingImg = e.target.result;
      const prev = document.getElementById('img-preview');
      prev.src = e.target.result; prev.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function setView(v) {
    document.getElementById('grid').classList.toggle('list-view', v==='list');
    document.getElementById('grid-btn').classList.toggle('active', v==='grid');
    document.getElementById('list-btn').classList.toggle('active', v==='list');
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Boot ──
  if (currentUser) {
    document.getElementById('name-gate').classList.add('hidden');
    showUserBadge();
    startPolling();
  }
</script>
</body>
</html>
